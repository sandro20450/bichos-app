name: Drone Autônomo Pentágono

# O Despertador: Ele roda automaticamente e também tem um botão manual
on:
  schedule:
    # 09:00 BRT
    - cron: '0 12 * * *'
    # 11:35, 12:35, 13:35, 14:35, 16:35, 17:35, 18:35, 19:35, 20:35, 21:35, 22:35, 23:35 BRT
    # Somando 3h para UTC:
    - cron: '35 14,15,16,17,19,20,21,22,23,0,1,2 * * *'
  workflow_dispatch: # Isso cria um botão para rodarmos quando quisermos

jobs:
  varredura:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Munição (Bibliotecas)
        run: |
          pip install requests beautifulsoup4 pandas gspread oauth2client

      - name: Iniciar Drone Pentágono
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python drone_pentagono.py
