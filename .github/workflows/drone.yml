name: Drone Autônomo Pentágono

# O Despertador: Ele roda automaticamente e também tem um botão manual
on:
  schedule:
    # Roda todos os dias às 11:30, 14:30, 16:30 e 19:30 no horário de Brasília (BRT)
    # Obs: O GitHub usa horário UTC, por isso somamos 3 horas (14, 17, 19, 22)
    - cron: '30 14,17,19,22 * * *'
  workflow_dispatch: # Isso cria um botão para rodarmos quando quisermos

jobs:
  varredura:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Munição (Bibliotecas)
        run: |
          pip install requests beautifulsoup4 pandas gspread oauth2client

      - name: Iniciar Drone Pentágono
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python drone_pentagono.py
